<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML and CSS Quiz | Xavier Rodriquez</title>
  <meta name="description" content="HTMl and CSS Quiz using and HTML Form.">
  <meta name="author" content="Xavier Rodriquez">
  <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

  <main>
    <h1>☑️ Basic HTML and CSS Quiz</h1>
    <form>
      <div class="question">
        <label for="q1"><span class="qnum">1. </span>What does the acronym CSS stand for?</label>
        <input type="text" id="q1" name="q1">
      </div>
      <div class="question">
        <label for="q2"><span class="qnum">2. </span>How are id and class attributes selected in
          CSS?
        </label>
        <textarea name="q2" id="q2" rows="4"></textarea>
      </div>
      <div class="question">
        <label for="q3"><span class="qnum">3. </span>Which of the following is a valid CSS
          comment?</label>
        <select name="q3" id="q3">
          <option value="" selected disabled>Choose One ...</option>
          <option value="a">// This is a CSS comment</option>
          <option value="b">&lt;!-- This is a CSS comment --&gt;/</option>
          <option value="c">/* This is a CSS comment */</option>
          <option value="d">/.. This is a CSS comment ../</option>
        </select>
      </div>
      <div class="question">
        <label for="q4"><span class="qnum">4. </span>What is the bottom margin given this
          declaration?</label>
        <code language="css">margin: 10px 5px 15px;</code>
        <input type="number" step="1" id="q4" name="q4">
      </div>

      <button type="submit">Submit Quiz</button>

    </form>
  </main>
</body>

</html>
