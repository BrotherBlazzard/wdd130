<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Water Adventures - Contact Us - 1-999-999-9999</title>
  <meta name="description"
    content="White Water Adventures is a white water rafting company providing ...">
  <meta name="author" content="Brother Blazzard">
  <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
  <header>
    <img src="images/wwa.png" alt="White Water Adventures Logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <form action="#" method="post">
      <label>Name:
        <input type="text" id="name" name="name" required></label>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label>Purpose of Message:</label>
      <label><input type="radio" name="purpose" value="General Inquiry" checked> General
        Inquiry</label>
      <label><input type="radio" name="purpose" value="Reservation Question"> Reservation
        Question</label>
      <label><input type="radio" name="purpose" value="Website Suggestion"> Website
        Suggestion</label>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="4" required></textarea>

      <label><input type="checkbox" name="subscribe" value="yes"> Please subscribe me to the monthly
        newsletter</label>
      <div class="item">
        <input type="checkbox" id="subscribe"><span class="checkA"> yes</span>
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>

  <footer>
    <p>©️2023 | White Water Adventures | Brother Blazzard</p>
    <div class="social">
      <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook.png"
          alt="Facebook"></a>
      <a href="https://www.instagram.com/" target="_blank"><img src="images/instagram.png"
          alt="Instagram"></a>
      <a href="https://www.twitter.com/" target="_blank"><img src="images/twitter.png"
          alt="Twitter"></a>
    </div>
  </footer>
</body>

</html>
